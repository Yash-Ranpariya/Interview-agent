<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIVA - Secure Company Login</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            padding: 3rem 2.5rem;
            text-align: center;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-box {
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 1.5rem;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .auth-header h2 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .auth-header p {
            color: var(--text-dim);
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .input-icon-wrapper {
            position: relative;
        }

        .input-icon-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
        }

        .input-icon-wrapper input {
            padding-left: 2.8rem;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: -0.5rem;
            margin-bottom: 2rem;
            font-size: 0.85rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .checkbox-label input {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
        }

        .login-btn {
            width: 100%;
            justify-content: center;
            font-size: 1rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .register-prompt {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .register-prompt a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .register-prompt a:hover {
            color: var(--text-main);
        }

        .flash-msg {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <div class="glass-panel auth-card">
            <div class="logo-box">
                <i class="fas fa-brain"></i>
            </div>
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Advanced Intelligence Validation Assistant</p>
            </div>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            {% for message in messages %}
            <div class="flash-msg">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-user-circle"></i>
                        <input type="text" name="username" class="glass-input" placeholder="Enter your username"
                            required autocomplete="off">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" class="glass-input" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="remember-forgot">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember" id="remember">
                        Remember Me
                    </label>
                    <a href="#" style="color: var(--text-dim); text-decoration: none;">Forgot Password?</a>
                </div>

                <button type="submit" class="glass-btn login-btn">
                    <span>Secure Sign In</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="register-prompt">
                Don't have an account? <a href="{{ url_for('register') }}">Create Instance</a>
            </div>
        </div>
    </div>
</body>

</html>
